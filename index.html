<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Blur Brush Plugin</title>
    <style>
        body { font-family: sans-serif; background: #252525; color: #fff; margin: 10px; text-align: center; }
        canvas { border: 1px solid #444; max-width: 100%; margin-top: 10px; cursor: crosshair; background: #1a1a1a; }
        .controls { display: flex; justify-content: space-around; margin: 10px 0; font-size: 13px; }
        button { background: #0078d4; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #005a9e; }
        label { display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <h3>Blur Brush Sandbox</h3>
    <button id="syncBtn">1. Pull Active Layer</button>
    
    <div class="controls">
        <div>
            <label>Brush Size</label>
            <input type="range" id="brushSize" min="5" max="100" value="30">
        </div>
        <div>
            <label>Blur Amount</label>
            <input type="range" id="blurAmount" min="1" max="20" value="8">
        </div>
    </div>

    <canvas id="canvas"></canvas>
    <br>
    <button id="sendBtn" style="margin-top:10px; background:#28a745;">2. Push Back to Photopea</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let img = new Image();
        let isDrawing = false;
        
        // Canvas configurations
        let brushSize = 30;
        let blurAmount = 8;
        
        document.getElementById('brushSize').oninput = (e) => brushSize = e.target.value;
        document.getElementById('blurAmount').oninput = (e) => blurAmount = e.target.value;

        // 1. Request active layer from Photopea as PNG data
        document.getElementById('syncBtn').onclick = () => {
            window.parent.postMessage('app.activeDocument.activeLayer.saveToOE("png");', '*');
        };

        // Listen for Photopea sending the image data back
        window.addEventListener('message', (e) => {
            if (e.data instanceof ArrayBuffer) {
                const blob = new Blob([e.data], { type: 'image/png' });
                const url = URL.createObjectURL(blob);
                img.src = url;
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                };
            }
        });

        // 2. The Interactive Blur Brush Logic
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; blurStroke(e); });
        canvas.addEventListener('mousemove', blurStroke);
        window.addEventListener('mouseup', () => isDrawing = false);

        function blurStroke(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            // Scale pointer to canvas coordinate system
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            ctx.save();
            // Create a circular clipping mask for the brush stroke
            ctx.beginPath();
            ctx.arc(x, y, brushSize, 0, Math.PI * 2);
            ctx.clip();

            // Apply blur filter inside the brush clip radius
            ctx.filter = `blur(${blurAmount}px)`;
            ctx.drawImage(canvas, 0, 0);
            ctx.restore();
        }

        // 3. Push modified canvas image back to Photopea layer
        document.getElementById('sendBtn').onclick = () => {
            canvas.toBlob((blob) => {
                blob.arrayBuffer().then((buffer) => {
                    // Send file back to Photopea to overwrite the active layer
                    window.parent.postMessage(buffer, '*');
                });
            }, 'image/png');
        };
    </script>
</body>
</html>
